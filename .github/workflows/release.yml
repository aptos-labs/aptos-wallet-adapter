name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual triggering from GitHub Actions UI

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  build:
    name: Build
    permissions:
      id-token: write # Required for npm OIDC trusted publishers
      actions: write
      pull-requests: write
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate as Aptos Labs Bot
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.12.0
        id: authenticate
        with:
          app-id: ${{ vars.APTOS_LABS_BOT_APP_ID }}
          private-key: ${{ secrets.APTOS_LABS_BOT_APP_PRIVATE_KEY }}

      - name: Checkout Repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        name: Install pnpm
        id: pnpm-install

      - name: Install global dependencies
        run: pnpm install --frozen-lockfile

      - name: Build global project
        env:
          GAID: ${{ vars.APTOS_WALLET_ADAPTER_GAID }}
        run: pnpm run build

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: pnpm run publish-packages
        env:
          GITHUB_TOKEN: ${{ steps.authenticate.outputs.token }}
          NPM_CONFIG_PROVENANCE: true
          NEXT_PUBLIC_SWAP_CCTP_SPONSOR_ACCOUNT_PRIVATE_KEY: ${{ secrets.NEXT_PUBLIC_SWAP_CCTP_SPONSOR_ACCOUNT_PRIVATE_KEY }}
          NEXT_PUBLIC_SWAP_CCTP_MAIN_SIGNER_PRIVATE_KEY: ${{ secrets.NEXT_PUBLIC_SWAP_CCTP_MAIN_SIGNER_PRIVATE_KEY }}
          NEXT_PUBLIC_GAS_STATION_API_KEY: ${{ secrets.NEXT_PUBLIC_GAS_STATION_API_KEY }}
          NEXT_PUBLIC_SWAP_CCTP_SPONSOR_ACCOUNT_GAS_STATION_API_KEY_TESTNET: ${{ secrets.NEXT_PUBLIC_SWAP_CCTP_SPONSOR_ACCOUNT_GAS_STATION_API_KEY_TESTNET }}
